name: Validate device codes

on:
  pull_request:
    paths:
      - "custom_components/ar_smart_ir/codes/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get changed device code files
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          FILES=$(git diff --name-only --diff-filter=ACMR \
            origin/${{ github.base_ref }} HEAD -- \
            'custom_components/ar_smart_ir/codes/**/*.json')
          echo "Changed files:"
          echo "$FILES"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate device code files
        if: steps.changed.outputs.files != ''
        run: |
          echo "${{ steps.changed.outputs.files }}" | \
            xargs -r python .github/scripts/validate_device_codes.py

      - name: Comment on PR if validation failed
        # Fork PRs get a read-only token, so posting a comment would 403.
        # Skip it there; the step summary and log still show the report.
        if: failure() && github.event.pull_request.head.repo.fork == false
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'Device code validation failed — see the Actions run summary for details.';
            const summaryPath = process.env.GITHUB_STEP_SUMMARY;
            if (summaryPath && fs.existsSync(summaryPath)) {
              const summary = fs.readFileSync(summaryPath, 'utf8').trim();
              if (summary) body = summary;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
