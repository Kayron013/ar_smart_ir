name: Validate device codes

on:
  pull_request:
    paths:
      - "custom_components/ar_smart_ir/codes/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get changed JSON files
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          FILES=$(git diff --name-only --diff-filter=ACMR \
            origin/${{ github.base_ref }} ${{ github.sha }} -- '*.json')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate device code files
        run: |
          python .github/scripts/validate_device_codes.py ${{ steps.changed.outputs.files }}

      - name: Comment on PR if validation failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = process.env.GITHUB_STEP_SUMMARY
              ? fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8')
              : 'Validation failed — see the Actions log for details.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary,
            });
